<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — RZStore</title>
  <script>(function(){const t=localStorage.getItem('rz_theme');const d=t==='dark'||(t===null&&window.matchMedia('(prefers-color-scheme:dark)').matches);if(d){document.documentElement.classList.add('dark');document.documentElement.setAttribute('data-theme','dark');}else{document.documentElement.setAttribute('data-theme','light');}})()</script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:{DEFAULT:'#6366f1',dark:'#4f46e5'}}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html.dark body { background-color: #0f172a !important; color: #e2e8f0 !important; }
    html.dark nav { background-color: rgba(15,23,42,0.97) !important; border-color: #334155 !important; }
    html.dark .bg-white { background-color: #1e293b !important; }
    html.dark .bg-gray-50 { background-color: #0f172a !important; }
    html.dark .bg-gray-100 { background-color: #1e293b !important; }
    html.dark .text-gray-900 { color: #f1f5f9 !important; }
    html.dark .text-gray-800 { color: #e2e8f0 !important; }
    html.dark .text-gray-700 { color: #cbd5e1 !important; }
    html.dark .text-gray-600 { color: #94a3b8 !important; }
    html.dark .text-gray-500 { color: #64748b !important; }
    html.dark .border-gray-200 { border-color: #334155 !important; }
    html.dark .border-gray-300 { border-color: #475569 !important; }
    html.dark .border-gray-100 { border-color: #1e293b !important; }
    html.dark input:not([type=radio]):not([type=checkbox]),html.dark textarea,html.dark select { background-color: #1e293b !important; color: #f1f5f9 !important; border-color: #475569 !important; }
    html.dark footer { background-color: #020617 !important; }
    html.dark #mobile-drawer { background-color: #1e293b !important; }
    html.dark #admin-sidebar { background-color: #020617 !important; }
    html.dark #product-modal > div, html.dark #order-detail-modal > div { background-color: #1e293b !important; }
    html.dark thead tr { background-color: rgba(30,41,59,0.9) !important; }
    html.dark td, html.dark th { border-color: #334155 !important; color: #cbd5e1 !important; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 font-sans min-h-screen">
  <nav class="sticky top-0 z-40 bg-white/95 dark:bg-slate-900/95 backdrop-blur border-b border-gray-200 dark:border-slate-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-indigo-600 dark:text-indigo-400"><i class="fas fa-store"></i><span>RZStore</span></a>
      <div class="flex items-center gap-2">
        <button id="dark-toggle" class="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-gray-100 dark:hover:bg-slate-700 transition"><i class="fas fa-moon text-slate-600 dark:text-slate-300"></i></button>
        <span id="user-name" class="hidden text-sm font-medium text-gray-700 dark:text-slate-300"></span>
        <button id="logout-btn" class="hidden px-3 py-1.5 border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-slate-300 text-sm font-medium rounded-lg hover:bg-gray-50 dark:hover:bg-slate-700 transition">Keluar</button>
        <span id="mobile-user-name" class="hidden"></span><a id="mobile-login-btn" href="login.html" class="hidden"></a><button id="mobile-logout-btn" class="hidden"></button>
        <a id="login-btn" href="login.html" class="hidden px-3 py-1.5 bg-indigo-600 text-white text-sm font-semibold rounded-lg">Masuk</a>
      </div>
    </div>
  </nav>
  <div id="drawer-overlay" class="hidden fixed inset-0 bg-black/50 z-40"></div>
  <div id="mobile-drawer" class="fixed top-0 right-0 h-full w-72 bg-white dark:bg-slate-800 z-50 transform translate-x-full transition-transform duration-300 shadow-2xl">
    <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-slate-700"><span class="font-bold text-indigo-600">RZStore</span><button id="drawer-close" class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-gray-100 text-gray-500"><i class="fas fa-times"></i></button></div>
  </div>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex items-center gap-3 mb-6">
      <a href="cart.html" class="text-gray-400 hover:text-indigo-600 transition"><i class="fas fa-arrow-left"></i></a>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white"><i class="fas fa-lock text-indigo-600 mr-2"></i>Checkout</h1>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
      <!-- Form -->
      <div class="lg:col-span-3">
        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 p-6">
          <h2 class="font-semibold text-gray-900 dark:text-white mb-5 flex items-center gap-2"><i class="fas fa-map-marker-alt text-indigo-500"></i>Informasi Pengiriman</h2>
          <form id="checkout-form" novalidate class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Nama Lengkap</label>
              <input type="text" id="co-name" placeholder="Nama penerima" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
              <p id="co-name-error" class="hidden mt-1 text-xs text-red-500"></p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Alamat Lengkap</label>
              <textarea id="co-address" rows="2" placeholder="Jl. Contoh No. 123, RT/RW..." class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
              <p id="co-address-error" class="hidden mt-1 text-xs text-red-500"></p>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Kota</label>
                <input type="text" id="co-city" placeholder="Jakarta" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                <p id="co-city-error" class="hidden mt-1 text-xs text-red-500"></p>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Kode Pos</label>
                <input type="text" id="co-postal" placeholder="12345" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                <p id="co-postal-error" class="hidden mt-1 text-xs text-red-500"></p>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">No. HP</label>
              <input type="tel" id="co-phone" placeholder="08xxxxxxxxxx" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
              <p id="co-phone-error" class="hidden mt-1 text-xs text-red-500"></p>
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-sm transition mt-2">
              <i class="fas fa-check-circle mr-2"></i>Buat Pesanan
            </button>
          </form>
        </div>
      </div>
      <!-- Summary -->
      <div class="lg:col-span-2">
        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 p-6 sticky top-24">
          <h2 class="font-semibold text-gray-900 dark:text-white mb-4">Ringkasan Pesanan</h2>
          <div id="checkout-items" class="space-y-1 mb-4 max-h-60 overflow-y-auto"></div>
          <div class="border-t border-gray-200 dark:border-slate-700 pt-4 space-y-2 text-sm">
            <div class="flex justify-between text-gray-600 dark:text-slate-400"><span>Subtotal</span><span id="co-subtotal" class="font-medium text-gray-900 dark:text-white"></span></div>
            <div class="flex justify-between text-gray-600 dark:text-slate-400"><span>Ongkir</span><span id="co-shipping" class="font-medium text-green-600"></span></div>
            <div class="flex justify-between font-bold text-base border-t border-gray-200 dark:border-slate-700 pt-2"><span class="text-gray-900 dark:text-white">Total</span><span id="co-total" class="text-indigo-600 dark:text-indigo-400"></span></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { seedDataIfNeeded, initNavbar } from './js/app.js';
    import { initCheckoutPage } from './js/checkout.js';
    document.addEventListener('DOMContentLoaded', async () => {
      await seedDataIfNeeded(); initNavbar(); initCheckoutPage();
    });
  </script>
</body>
</html>
