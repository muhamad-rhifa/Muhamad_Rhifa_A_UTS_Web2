<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Produk — RZStore</title>
  <script>(function(){const t=localStorage.getItem('rz_theme');const d=t==='dark'||(t===null&&window.matchMedia('(prefers-color-scheme:dark)').matches);if(d){document.documentElement.classList.add('dark');document.documentElement.setAttribute('data-theme','dark');}else{document.documentElement.setAttribute('data-theme','light');}})()</script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:{DEFAULT:'#6366f1',dark:'#4f46e5'}}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html.dark body { background-color: #0f172a !important; color: #e2e8f0 !important; }
    html.dark nav { background-color: rgba(15,23,42,0.97) !important; border-color: #334155 !important; }
    html.dark .bg-white { background-color: #1e293b !important; }
    html.dark .bg-gray-50 { background-color: #0f172a !important; }
    html.dark .bg-gray-100 { background-color: #1e293b !important; }
    html.dark .text-gray-900 { color: #f1f5f9 !important; }
    html.dark .text-gray-800 { color: #e2e8f0 !important; }
    html.dark .text-gray-700 { color: #cbd5e1 !important; }
    html.dark .text-gray-600 { color: #94a3b8 !important; }
    html.dark .text-gray-500 { color: #64748b !important; }
    html.dark .border-gray-200 { border-color: #334155 !important; }
    html.dark .border-gray-300 { border-color: #475569 !important; }
    html.dark .border-gray-100 { border-color: #1e293b !important; }
    html.dark input:not([type=radio]):not([type=checkbox]),html.dark textarea,html.dark select { background-color: #1e293b !important; color: #f1f5f9 !important; border-color: #475569 !important; }
    html.dark footer { background-color: #020617 !important; }
    html.dark #mobile-drawer { background-color: #1e293b !important; }
    html.dark #admin-sidebar { background-color: #020617 !important; }
    html.dark #product-modal > div, html.dark #order-detail-modal > div { background-color: #1e293b !important; }
    html.dark thead tr { background-color: rgba(30,41,59,0.9) !important; }
    html.dark td, html.dark th { border-color: #334155 !important; color: #cbd5e1 !important; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 font-sans min-h-screen">

  <!-- ===== NAVBAR ===== -->
  <nav class="sticky top-0 z-40 bg-white/95 dark:bg-slate-900/95 backdrop-blur border-b border-gray-200 dark:border-slate-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-indigo-600 dark:text-indigo-400">
          <i class="fas fa-store"></i><span>RZStore</span>
        </a>
        <div class="hidden md:flex items-center gap-6">
          <a href="index.html" data-nav-link class="text-sm font-medium text-gray-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition">Beranda</a>
          <a href="shop.html" data-nav-link class="text-sm font-medium text-gray-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition">Shop</a>
          <a href="wishlist.html" data-nav-link class="text-sm font-medium text-gray-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition">Wishlist</a>
          <a href="orders.html" data-nav-link class="text-sm font-medium text-gray-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition">Pesanan</a>
          <a id="admin-nav-link" href="admin.html" class="hidden items-center gap-1.5 px-3 py-1.5 bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400 text-sm font-semibold rounded-lg hover:bg-purple-200 dark:hover:bg-purple-900/50 transition">
            <i class="fas fa-shield-alt text-xs"></i> Admin
          </a>
        </div>
        <div class="flex items-center gap-2">
          <button id="dark-toggle" class="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-gray-100 dark:hover:bg-slate-700 transition">
            <i class="fas fa-moon text-slate-600 dark:text-slate-300"></i>
          </button>
          <a href="cart.html" class="relative w-9 h-9 rounded-lg flex items-center justify-center hover:bg-gray-100 dark:hover:bg-slate-700 transition text-gray-600 dark:text-slate-300">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-badge" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-indigo-600 text-white text-xs rounded-full flex items-center justify-center font-bold">0</span>
          </a>
          <a id="user-name" href="profile.html" class="hidden text-sm font-medium text-gray-700 dark:text-slate-300 max-w-[100px] truncate hover:text-indigo-600 transition"></a>
          <a id="login-btn" href="login.html" class="hidden px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg transition">Masuk</a>
          <button id="logout-btn" class="hidden px-3 py-1.5 border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-slate-300 text-sm font-medium rounded-lg hover:bg-gray-50 dark:hover:bg-slate-700 transition">Keluar</button>
          <button id="hamburger-btn" class="md:hidden w-9 h-9 rounded-lg flex items-center justify-center hover:bg-gray-100 dark:hover:bg-slate-700 transition text-gray-600 dark:text-slate-300">
            <i class="fas fa-bars"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Mobile Drawer -->
  <div id="drawer-overlay" class="hidden fixed inset-0 bg-black/50 z-40"></div>
  <div id="mobile-drawer" class="fixed top-0 right-0 h-full w-72 bg-white dark:bg-slate-800 z-50 transform translate-x-full transition-transform duration-300 shadow-2xl">
    <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-slate-700">
      <span class="font-bold text-indigo-600 dark:text-indigo-400"><i class="fas fa-store mr-2"></i>RZStore</span>
      <button id="drawer-close" class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-gray-100 dark:hover:bg-slate-700 text-gray-500"><i class="fas fa-times"></i></button>
    </div>
    <nav class="p-4 space-y-1">
      <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-slate-700 text-sm font-medium"><i class="fas fa-home w-4"></i>Beranda</a>
      <a href="shop.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-slate-700 text-sm font-medium"><i class="fas fa-store w-4"></i>Shop</a>
      <a href="wishlist.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-slate-700 text-sm font-medium"><i class="fas fa-heart w-4"></i>Wishlist</a>
      <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-slate-700 text-sm font-medium"><i class="fas fa-box w-4"></i>Pesanan</a>
      <a id="mobile-admin-link" href="admin.html" class="hidden items-center gap-3 px-3 py-2.5 rounded-lg text-purple-700 dark:text-purple-400 bg-purple-50 dark:bg-purple-900/20 text-sm font-semibold"><i class="fas fa-shield-alt w-4"></i>Admin Panel</a>
    </nav>
    <div class="p-4 border-t border-gray-200 dark:border-slate-700 space-y-2">
      <span id="mobile-user-name" class="hidden block text-sm font-medium text-gray-700 dark:text-slate-300 px-3 py-2"></span>
      <a id="mobile-login-btn" href="login.html" class="hidden w-full text-center px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-lg">Masuk</a>
      <button id="mobile-logout-btn" class="hidden w-full px-4 py-2 border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-slate-300 text-sm font-medium rounded-lg">Keluar</button>
    </div>
  </div>

  <!-- ===== MAIN ===== -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 text-sm text-gray-500 dark:text-slate-400 mb-6">
      <a href="index.html" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition">Beranda</a>
      <i class="fas fa-chevron-right text-xs"></i>
      <a href="shop.html" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition">Shop</a>
      <i class="fas fa-chevron-right text-xs"></i>
      <a id="breadcrumb-category" href="shop.html" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition"></a>
      <i class="fas fa-chevron-right text-xs"></i>
      <span id="breadcrumb-name" class="text-gray-900 dark:text-white font-medium truncate max-w-[200px]"></span>
    </nav>

    <!-- Not Found -->
    <div id="product-not-found" class="hidden text-center py-20">
      <div class="w-20 h-20 bg-gray-100 dark:bg-slate-700 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-box-open text-3xl text-gray-400"></i>
      </div>
      <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-2">Produk tidak ditemukan</h2>
      <p class="text-gray-500 dark:text-slate-400 text-sm mb-4">Produk yang kamu cari tidak tersedia.</p>
      <a href="shop.html" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg transition">
        <i class="fas fa-arrow-left mr-2"></i>Kembali ke Shop
      </a>
    </div>

    <!-- Product Detail -->
    <div id="product-detail-main">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-12">

        <!-- Image -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl overflow-hidden border border-gray-200 dark:border-slate-700 aspect-square">
          <img id="detail-image" src="" alt=""
            class="w-full h-full object-cover"
            onerror="this.src='https://placehold.co/600x600/e5e7eb/9ca3af?text=No+Image'" />
        </div>

        <!-- Info -->
        <div class="flex flex-col">
          <span id="detail-category" class="inline-block self-start px-3 py-1 bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 text-xs font-semibold rounded-full mb-3"></span>
          <h1 id="detail-name" class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white mb-3 leading-tight"></h1>

          <!-- Rating -->
          <div class="flex items-center gap-2 mb-4">
            <div id="detail-stars" class="flex text-sm"></div>
            <span id="detail-rating-text" class="text-sm text-gray-500 dark:text-slate-400"></span>
          </div>

          <!-- Price -->
          <div class="mb-4">
            <span id="detail-price" class="text-3xl font-bold text-indigo-600 dark:text-indigo-400"></span>
          </div>

          <!-- Stock -->
          <div id="detail-stock" class="mb-4"></div>

          <!-- Description -->
          <p id="detail-description" class="text-gray-600 dark:text-slate-400 text-sm leading-relaxed mb-5"></p>

          <!-- Tags -->
          <div id="detail-tags" class="flex flex-wrap gap-2 mb-6"></div>

          <!-- Qty + Actions -->
          <div class="flex items-center gap-3 mb-4">
            <div class="flex items-center border border-gray-300 dark:border-slate-600 rounded-xl overflow-hidden">
              <button id="qty-minus" class="w-10 h-10 flex items-center justify-center text-gray-600 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition font-bold text-lg">−</button>
              <input id="detail-qty" type="number" value="1" min="1"
                class="w-12 h-10 text-center text-sm font-semibold bg-transparent text-gray-900 dark:text-white border-x border-gray-300 dark:border-slate-600 focus:outline-none" />
              <button id="qty-plus" class="w-10 h-10 flex items-center justify-center text-gray-600 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition font-bold text-lg">+</button>
            </div>
            <button id="detail-add-cart-btn"
              class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-sm transition focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <i class="fas fa-cart-plus mr-2"></i>Tambah ke Keranjang
            </button>
          </div>

          <button id="detail-wishlist-btn"
            class="flex items-center justify-center gap-2 py-2.5 border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-slate-300 font-medium rounded-xl text-sm hover:bg-gray-50 dark:hover:bg-slate-700 transition">
            <i class="far fa-heart"></i> Tambah ke Wishlist
          </button>
        </div>
      </div>

      <!-- Related Products -->
      <div id="related-section">
        <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-5">Produk Serupa</h2>
        <div id="related-grid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="bg-gray-900 dark:bg-slate-950 text-white mt-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-3">
        <div class="flex items-center gap-2 text-lg font-bold text-indigo-400">
          <i class="fas fa-store"></i><span>RZStore</span>
        </div>
        <p class="text-gray-500 text-xs">© 2025 RZStore. All rights reserved.</p>
        <div class="flex gap-3">
          <a href="#" class="w-8 h-8 bg-gray-800 hover:bg-indigo-600 rounded-lg flex items-center justify-center transition text-gray-400 hover:text-white"><i class="fab fa-instagram text-sm"></i></a>
          <a href="#" class="w-8 h-8 bg-gray-800 hover:bg-indigo-600 rounded-lg flex items-center justify-center transition text-gray-400 hover:text-white"><i class="fab fa-twitter text-sm"></i></a>
        </div>
      </div>
    </div>
  </footer>

  <script type="module">
    import { seedDataIfNeeded, initNavbar } from './js/app.js';
    import { initProductDetailPage } from './js/products.js';

    document.addEventListener('DOMContentLoaded', async () => {
      await seedDataIfNeeded();
      initNavbar();
      initProductDetailPage();
    });
  </script>
</body>
</html>
